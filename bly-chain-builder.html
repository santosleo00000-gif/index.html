<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLY! — Monte sua corrente</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-secondary: #666;
    --text-tertiary: #aaa;
    --accent: #7c3aed;
    --accent-light: #f5f3ff;
    --radius-md: 8px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page {
    max-width: 680px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .header { margin-bottom: .5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .75rem;
  }

  /* QTY BUTTONS */
  .qty-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .qty-btn {
    flex: 1;
    padding: 10px 6px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: #fafafa;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all .15s;
  }
  .qty-btn:hover { background: var(--accent-light); color: var(--accent); }
  .qty-btn.active {
    border: 2px solid var(--accent);
    color: var(--accent);
    background: var(--accent-light);
    font-weight: 600;
  }

  /* SLOTS */
  .slots { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
  .slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: #fafafa;
    cursor: pointer;
    transition: border-color .15s;
  }
  .slot.active { border: 1.5px solid var(--accent); background: var(--accent-light); }
  .slot-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    width: 14px;
    text-align: center;
  }
  .slot-swatch {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px dashed var(--border-md);
    background: #eee;
    flex-shrink: 0;
    transition: transform .1s;
  }
  .slot-swatch.filled { border-style: solid; border-color: rgba(0,0,0,.15); }
  .slot-name {
    flex: 1;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .slot-actions { display: flex; gap: 4px; align-items: center; }
  .icon-btn {
    background: none;
    border: 0.5px solid var(--border-md);
    border-radius: 5px;
    padding: 3px 5px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1;
    transition: background .1s;
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn:disabled { opacity: .3; cursor: default; }
  .clear-btn {
    font-size: 11px;
    color: #e24b4a;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    border: 0.5px solid rgba(226,75,74,.25);
    background: rgba(226,75,74,.05);
    display: none;
  }
  .clear-btn.show { display: inline; }

  /* COLOR WHEEL */
  .picker-section { margin-top: .25rem; }
  .picker-title {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: .75rem;
  }
  .picker-title strong { color: var(--text); }
  .wheel-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #hueWheel {
    cursor: crosshair;
    border-radius: 50%;
    display: block;
  }
  .swatches-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .swatch-quick {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 1.5px solid rgba(0,0,0,.12);
    transition: transform .1s;
  }
  .swatch-quick:hover { transform: scale(1.15); }

  /* CHAIN PREVIEW */
  .preview-wrap {
    background: #f0eff0;
    border-radius: var(--radius-md);
    padding: 1rem;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 140px;
    overflow: hidden;
  }
  #chainCanvas { display: block; max-width: 100%; }

  .preview-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
    margin-top: .5rem;
  }

  /* STEP BADGE */
  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: .75rem;
    border: 1px solid rgba(124,58,237,.15);
  }

  .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>BLY! <span style="font-weight:300;color:var(--text-secondary)">— monte sua corrente</span></h1>
    <p>Personalize os elos, cores e pingente do jeito que quiser</p>
  </div>

  <!-- STEP 1 -->
  <div class="card">
    <div class="step-badge"><i class="ti ti-link"></i> Etapa 1 — corrente</div>

    <div class="section-label">Quantidade de cores</div>
    <div class="qty-row">
      <button class="qty-btn active" onclick="setQty(1)">1 cor</button>
      <button class="qty-btn" onclick="setQty(2)">2 cores</button>
      <button class="qty-btn" onclick="setQty(3)">3 cores</button>
    </div>

    <div class="section-label">Cores selecionadas</div>
    <div class="slots" id="slots"></div>

    <div class="divider"></div>

    <div class="picker-section">
      <p class="picker-title" id="pickerTitle">Clique no disco para escolher a <strong>cor 1</strong></p>
      <div class="wheel-wrap">
        <canvas id="hueWheel" width="220" height="220"></canvas>
        <div class="swatches-row" id="quickSwatches"></div>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <div class="step-badge" style="color:#059669;background:#ecfdf5;border-color:rgba(5,150,105,.15)"><i class="ti ti-eye"></i> Pré-visualização</div>
    <div class="preview-wrap">
      <canvas id="chainCanvas" width="600" height="120"></canvas>
    </div>
    <p class="preview-hint" id="previewHint">Escolha pelo menos uma cor para ver sua corrente</p>
  </div>

</div>

<script>
const state = {
  qty: 1,
  colors: [null, null, null],
  activeSlot: 0
};

const QUICK = [
  '#ffffff','#d4d4d4','#737373','#171717','#000000',
  '#ef4444','#f97316','#eab308','#22c55e','#06b6d4',
  '#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f59e0b',
  '#a3e635','#fb923c','#c084fc','#67e8f9','#fda4af'
];

function setQty(n) {
  state.qty = n;
  document.querySelectorAll('.qty-btn').forEach((b,i) => b.classList.toggle('active', i === n-1));
  if(state.activeSlot >= n) state.activeSlot = 0;
  renderSlots();
  renderChain();
}

function renderSlots() {
  const c = document.getElementById('slots');
  c.innerHTML = '';
  for(let i = 0; i < state.qty; i++) {
    const col = state.colors[i];
    const div = document.createElement('div');
    div.className = 'slot' + (state.activeSlot === i ? ' active' : '');
    div.onclick = () => { state.activeSlot = i; renderSlots(); updatePickerLabel(); };
    div.innerHTML = `
      <span class="slot-num">${i+1}</span>
      <div class="slot-swatch${col?' filled':''}" style="${col?'background:'+col+';border-color:rgba(0,0,0,.2)':''}"></div>
      <span class="slot-name" style="${col?'color:var(--text);font-weight:500':''}">
        ${col ? col.toUpperCase() : 'toque para escolher'}
      </span>
      <div class="slot-actions">
        <button class="icon-btn" onclick="event.stopPropagation();moveSlot(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="icon-btn" onclick="event.stopPropagation();moveSlot(${i},1)" ${i===state.qty-1?'disabled':''}>↓</button>
        <span class="clear-btn${col?' show':''}" onclick="event.stopPropagation();clearSlot(${i})">✕ limpar</span>
      </div>`;
    c.appendChild(div);
  }
  updatePickerLabel();
}

function updatePickerLabel() {
  document.getElementById('pickerTitle').innerHTML =
    `Clique no disco para escolher a <strong>cor ${state.activeSlot+1}</strong>`;
}

function clearSlot(i) {
  state.colors[i] = null;
  renderSlots();
  renderChain();
}

function moveSlot(i, dir) {
  const j = i + dir;
  if(j < 0 || j >= state.qty) return;
  [state.colors[i], state.colors[j]] = [state.colors[j], state.colors[i]];
  if(state.activeSlot === i) state.activeSlot = j;
  else if(state.activeSlot === j) state.activeSlot = i;
  renderSlots();
  renderChain();
}

/* ---- COLOR WHEEL ---- */
function drawWheel() {
  const cv = document.getElementById('hueWheel');
  const ctx = cv.getContext('2d');
  const cx = 110, cy = 110, R = 100, thick = 30;
  ctx.clearRect(0, 0, 220, 220);

  for(let a = 0; a < 360; a++) {
    const s = (a - 1) * Math.PI / 180;
    const e = (a + 1) * Math.PI / 180;
    const g = ctx.createRadialGradient(cx, cy, R-thick, cx, cy, R);
    g.addColorStop(0, `hsl(${a},20%,90%)`);
    g.addColorStop(1, `hsl(${a},100%,50%)`);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(s)*(R-thick), cy + Math.sin(s)*(R-thick));
    ctx.arc(cx, cy, R, s, e);
    ctx.arc(cx, cy, R-thick, e, s, true);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();
  }

  // inner gradient disc (lightness)
  const inner = ctx.createRadialGradient(cx, cy, 0, cx, cy, R-thick-2);
  inner.addColorStop(0, 'white');
  inner.addColorStop(0.5, 'rgba(200,200,200,0.4)');
  inner.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.beginPath();
  ctx.arc(cx, cy, R-thick-2, 0, Math.PI*2);
  ctx.fillStyle = inner;
  ctx.fill();
}

document.getElementById('hueWheel').addEventListener('click', function(e) {
  const cv = this;
  const rect = cv.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const px = Math.round(sx * cv.width / rect.width);
  const py = Math.round(sy * cv.height / rect.height);
  const ctx = cv.getContext('2d');
  const d = ctx.getImageData(px, py, 1, 1).data;
  if(d[3] < 20) return;
  const col = `rgb(${d[0]},${d[1]},${d[2]})`;
  setColor(col);
});

function hexFromRgb(r,g,b) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function setColor(col) {
  state.colors[state.activeSlot] = col;
  if(state.activeSlot < state.qty - 1) state.activeSlot++;
  renderSlots();
  renderChain();
}

/* QUICK SWATCHES */
function renderQuickSwatches() {
  const c = document.getElementById('quickSwatches');
  QUICK.forEach(col => {
    const s = document.createElement('div');
    s.className = 'swatch-quick';
    s.style.background = col;
    s.title = col;
    s.onclick = () => setColor(col);
    c.appendChild(s);
  });
}

/* ---- CHAIN RENDER ---- */
function parseRgb(col) {
  if(!col) return [200,200,200];
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = 1;
  const ctx = tmp.getContext('2d');
  ctx.fillStyle = col;
  ctx.fillRect(0,0,1,1);
  const d = ctx.getImageData(0,0,1,1).data;
  return [d[0],d[1],d[2]];
}

function makeShadedVersions(col) {
  const [r,g,b] = parseRgb(col);
  const bright = `rgb(${Math.min(r+80,255)},${Math.min(g+80,255)},${Math.min(b+80,255)})`;
  const dark = `rgb(${Math.max(r-70,0)},${Math.max(g-70,0)},${Math.max(b-70,0)})`;
  return { bright, dark, base: col };
}

function getChainColor(idx) {
  const active = state.colors.slice(0, state.qty);
  const filled = active.filter(Boolean);
  if(!filled.length) return null;
  if(state.qty === 1) return active[0] || filled[0];
  if(state.qty === 2) {
    const a = active[0] || filled[0];
    const b = active[1] || filled[0];
    return idx % 2 === 0 ? a : b;
  }
  // 3 cores
  const a = active[0] || filled[0];
  const b_ = active[1] || filled[0];
  const c2 = active[2] || filled[0];
  return [a, b_, c2][idx % 3];
}

function drawLink(ctx, cx, cy, rx, ry, col, glass) {
  if(glass) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(160,160,160,0.4)';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx*0.55, ry*0.55, 0, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    return;
  }

  const { bright, dark, base } = makeShadedVersions(col);
  ctx.save();

  // outer ring (the link body)
  const g = ctx.createLinearGradient(cx-rx, cy-ry, cx+rx, cy+ry);
  g.addColorStop(0, bright);
  g.addColorStop(0.4, base);
  g.addColorStop(1, dark);

  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // punch hole
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx-5, ry-5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // highlight
  const hg = ctx.createRadialGradient(cx - rx*0.25, cy - ry*0.3, 1, cx, cy, rx*0.6);
  hg.addColorStop(0, 'rgba(255,255,255,0.45)');
  hg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  ctx.fillStyle = hg;
  ctx.fill();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx-5, ry-5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  ctx.restore();
}

function renderChain() {
  const cv = document.getElementById('chainCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);

  const total = 16;
  const cy = cv.height / 2;
  const startX = 28;
  const stepX = 36;
  const hasColors = state.colors.slice(0, state.qty).some(Boolean);

  for(let i = 0; i < total; i++) {
    const cx = startX + i * stepX;
    const vertical = i % 2 === 0;
    const rx = vertical ? 13 : 26;
    const ry = vertical ? 24 : 11;
    const col = getChainColor(i);
    drawLink(ctx, cx, cy, rx, ry, col, !hasColors || !col);
  }

  document.getElementById('previewHint').style.display = hasColors ? 'none' : 'block';
}

drawWheel();
renderQuickSwatches();
renderSlots();
renderChain();
</script>
</body>
</html>
